<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantified | Verify Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00FF41;
            --black: #000000;
            --surface: #121212;
            --zinc-500: #71717a;
            --zinc-800: #27272a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--black);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--zinc-800);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background: rgba(0, 255, 65, 0.1);
            border: 2px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        p {
            color: var(--zinc-500);
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: black;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.1rem;
            transition: all 0.2s;
            cursor: pointer;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
        }

        .desktop-only {
            display: none;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--zinc-800);
        }

        @media (min-width: 768px) {
            .desktop-only {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">QUANTIFIED</div>
        
        <div class="icon-circle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00FF41" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h1>Success!</h1>
        <p id="status-text">Your account has been verified. Redirecting you to the app...</p>

        <a id="app-link" href="quantified://" class="btn">OPEN APP</a>

        <div class="desktop-only">
            (Best viewed on mobile)
        </div>
    </div>

    <script>
        // Get the full URL including hash/params
        const currentUrl = window.location.href;
        
        // Build the deep link (Supabase appends the token to the hash)
        const deepLink = "quantified://?origin=" + encodeURIComponent(currentUrl);
        
        document.getElementById('app-link').href = deepLink;

        // Auto-redirect if on mobile
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        
        if (isMobile) {
            // Attempt to open the app automatically
            setTimeout(() => {
                window.location.href = deepLink;
            }, 500);
        } else {
            document.getElementById('status-text').innerHTML = "Account verified! Please open the <b>Quantified</b> app on your phone to continue.";
        }
    </script>
</body>
</html>
